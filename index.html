<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 核心手机适配meta标签 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="transparent">
<title>致我最爱的陈容 ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    /* 浪漫背景图 + 渐变叠加（手机端适配） */
    background: linear-gradient(135deg, rgba(240, 211, 230, 0.9), rgba(245, 208, 217, 0.9), rgba(250, 220, 217, 0.9), rgba(215, 231, 245, 0.9)), 
                url('https://picsum.photos/id/1082/1080/1920') center/cover no-repeat fixed;
    background-size:400% 400%, cover;
    animation:bgGradient 18s ease infinite;
    min-height:100vh;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 20px; /* 手机端左右留白 */
    overflow-x:hidden;
    transition: all 1s;
}
@keyframes bgGradient{
    0%{background-position:0% 50%, center center}
    50%{background-position:100% 50%, center center}
    100%{background-position:0% 50%, center center}
}

/* 爱心飘动（手机端速度适配） */
.heart{
    position:fixed;
    pointer-events:none;
    animation:heartFly 3.5s linear forwards; /* 手机端放慢一点更明显 */
    z-index: 5;
}
@keyframes heartFly{
    0%{transform:translateY(0) scale(0);opacity:1}
    100%{transform:translateY(-800px) scale(1.2);opacity:0}
}

/* 烟花样式（手机端尺寸适配） */
.firework {
    position: absolute;
    width: 4px; /* 手机端缩小烟花尺寸 */
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    animation: fireworkAnim 1.5s linear forwards;
    z-index: 5;
}
@keyframes fireworkAnim {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
}

/* 卡片（手机端核心适配） */
.card{
    background:rgba(255,255,255,0.95);
    border-radius: 24px; /* 手机端圆角更柔和 */
    padding: 40px 25px; /* 手机端减少内边距 */
    width: 100%; /* 手机端占满屏幕宽度 */
    max-width: 500px; /* 限制最大宽度 */
    text-align:center;
    box-shadow:0 15px 50px rgba(0,0,0,0.1);
    position:relative;
    z-index:10;
    animation:fadeIn 1.2s ease-out;
    transition: all 1s;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

.title{
    font-size: clamp(28px, 8vw, 38px); /* 响应式字体：适配不同手机尺寸 */
    color: #b56576;
    margin-bottom: 20px;
    font-weight: 600;
    letter-spacing: 1px; /* 手机端减少字间距 */
    line-height: 1.2;
}
.name{
    color: #c95c70;
    font-size: clamp(32px, 9vw, 46px);
    font-weight: bold;
}
.text{
    font-size: clamp(16px, 5vw, 21px); /* 响应式文字 */
    line-height: 1.8;
    color: #555;
    margin-bottom: 30px;
    transition: all 0.8s;
    letter-spacing: 0.5px;
    padding: 0 10px; /* 手机端左右留白 */
}

/* 按钮（手机端触控优化） */
.love-btn{
    background: linear-gradient(90deg, #b56576, #c95c70, #d48999);
    color: #fff;
    border: none;
    padding: 16px 40px; /* 手机端调整按钮大小 */
    border-radius: 60px;
    font-size: clamp(16px, 5vw, 20px);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 8px 20px rgba(181, 101, 118, 0.25);
    letter-spacing: 1px;
    width: 85%; /* 手机端按钮更宽，方便点击 */
    max-width: 380px;
    touch-action: manipulation; /* 优化手机触控 */
    -webkit-tap-highlight-color: transparent; /* 去除点击高亮 */
}
.love-btn:hover, .love-btn:active{
    transform:scale(1.05); /* 手机端缩小缩放幅度 */
    box-shadow:0 10px 25px rgba(181, 101, 118, 0.35);
}
.love-btn:disabled{
    opacity: 0.9; /* 禁用状态更明显 */
}

/* 音频控件（手机端适配） */
.audio-player {
    position: fixed;
    bottom: 15px;
    left: 15px;
    opacity: 0.2;
    transition: opacity 0.3s;
    z-index: 999;
    width: 40px; /* 手机端缩小音频控件 */
    height: 40px;
}
.audio-player:hover {
    opacity: 1;
}

/* 适配横屏手机 */
@media screen and (orientation: landscape) {
    .card {
        padding: 30px 20px;
        max-width: 400px;
    }
    .title {
        font-size: 32px;
    }
    .text {
        font-size: 18px;
    }
}

/* 适配小屏手机（如iPhone SE） */
@media screen and (max-width: 375px) {
    .card {
        padding: 30px 15px;
    }
    .love-btn {
        padding: 14px 30px;
    }
}
</style>
</head>
<body>
<!-- 背景音乐（手机端兼容） -->
<audio class="audio-player" src="https://music.163.com/song/media/outer/url?id=1889121050.mp3" autoplay loop controls>
    您的浏览器不支持音频播放
</audio>

<div class="card">
    <div class="title">致我最爱的<span class="name">陈容</span></div>
    <div class="text" id="loveText">
        遇见你，是我所有温柔的开始。<br>
        我的世界，因为你而变得绚丽明亮。<br>
        我想把所有浪漫、偏爱、余生<br>
        都只给你一个人。
    </div>

    <button class="love-btn" id="loveBtn" onclick="sendHearts()">❤️ 我爱你，陈容 ❤️</button>
</div>

<script>
let clickCount = 0;

// 点击爱心主函数（手机端优化）
function sendHearts(){
    clickCount++;
    const btn = document.getElementById('loveBtn');
    const text = document.getElementById('loveText');
    const card = document.querySelector('.card');

    // 第一次点击：按钮文字变化 + 爱心
    if(clickCount === 1){
        btn.innerHTML = "💖 超级爱你 💖";
        btn.style.transform = "scale(1.08)"; // 手机端缩小缩放
        createHearts(25); // 减少爱心数量，避免手机卡顿
    }

    // 第二次点击：文案变化
    else if(clickCount === 2){
        btn.innerHTML = "🥰 只爱陈容 🥰";
        text.innerHTML = "你是晚风，是星光，是人间理想。<br>你是初见，是心动，是余生唯一。<br>我的温柔，我的宠溺，我的全部，<br>都属于你，只属于你。";
        text.style.color = "#b56576";
        createHearts(35);
    }

    // 第三次点击：终极浪漫 + 全屏烟花
    else if(clickCount === 3){
        btn.innerHTML = "💍 余生请多指教 💍";
        btn.disabled = true;
        btn.style.background = "linear-gradient(90deg, #a84a5f, #b54a5f)";
        
        // 手机端卡片缩放更柔和
        card.style.transform = "scale(1.03)";
        card.style.boxShadow = "0 20px 60px rgba(181, 101, 118, 0.2)";

        // 减少烟花/爱心数量，避免手机卡顿
        createHearts(45);
        createFireworks(20);
    }
}

// 生成爱心（手机端优化）
function createHearts(num){
    const colors=["#b56576","#c95c70","#d48999","#e8b4c0","#f5d0d9"];
    for(let i=0;i<num;i++){
        const heart=document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*100+"vw";
        heart.style.fontSize=Math.random()*8+10+"px"; // 手机端缩小爱心大小
        heart.style.color=colors[Math.floor(Math.random()*colors.length)];
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),3500); // 延长移除时间
    }
}

// 生成烟花（手机端优化）
function createFireworks(num){
    const fireColors = ["#b56576","#c95c70","#d48999","#f5d0d9","#ffffff"];
    for(let i=0;i<num;i++){
        setTimeout(()=>{
            const fire = document.createElement("div");
            fire.classList.add("firework");
            fire.style.background = fireColors[Math.floor(Math.random()*fireColors.length)];
            fire.style.left = Math.random()*100+"vw";
            fire.style.top = Math.random()*100+"vh";
            document.body.appendChild(fire);
            setTimeout(()=>fire.remove(),1500);
        },i*100);
    }
}

// 自动飘心（手机端减少频率，避免卡顿）
setInterval(()=>{
    const h=document.createElement("div");
    h.classList.add("heart");
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=Math.random()*8+10+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),3500);
},1200); // 延长间隔

// 解决手机端音频自动播放限制
document.addEventListener('click', function() {
    const audio = document.querySelector('.audio-player');
    if (audio && audio.paused) {
        audio.play().catch(err => {
            console.log("点击播放音频:", err); // 兼容部分安卓手机
        });
    }
}, { once: true });

// 禁止手机端缩放
document.addEventListener('touchmove', function(event) {
    if (event.scale !== 1) {
        event.preventDefault();
    }
}, { passive: false });
</script>
</body>
</html>
