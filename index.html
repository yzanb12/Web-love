<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>致我最爱的陈容 ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    /* 浪漫背景图 + 渐变叠加（避免图片太艳） */
    background: linear-gradient(135deg, rgba(240, 211, 230, 0.9), rgba(245, 208, 217, 0.9), rgba(250, 220, 217, 0.9), rgba(215, 231, 245, 0.9)), 
                url('https://picsum.photos/id/1082/1920/1080') center/cover no-repeat fixed;
    background-size:400% 400%, cover;
    animation:bgGradient 18s ease infinite;
    min-height:100vh;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    transition: all 1s;
}
@keyframes bgGradient{
    0%{background-position:0% 50%, center center}
    50%{background-position:100% 50%, center center}
    100%{background-position:0% 50%, center center}
}

/* 爱心飘动 */
.heart{
    position:fixed;
    pointer-events:none;
    animation:heartFly 3s linear forwards
}
@keyframes heartFly{
    0%{transform:translateY(0) scale(0);opacity:1}
    100%{transform:translateY(-800px) scale(1.5);opacity:0}
}

/* 烟花样式 */
.firework {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    animation: fireworkAnim 1.5s linear forwards;
}
@keyframes fireworkAnim {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
}

/* 卡片 */
.card{
    background:rgba(255,255,255,0.95);
    border-radius: 30px;
    padding:60px 50px;
    max-width:620px;
    text-align:center;
    box-shadow:0 25px 70px rgba(0,0,0,0.12);
    position:relative;
    z-index:10;
    animation:fadeIn 1.2s ease-out;
    transition: all 1s;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(40px)}
    to{opacity:1;transform:translateY(0)}
}

.title{
    font-size: 38px;
    color: #b56576;
    margin-bottom:24px;
    font-weight: 600;
    letter-spacing: 2px;
}
.name{
    color: #c95c70;
    font-size: 46px;
    font-weight: bold;
}
.text{
    font-size: 21px;
    line-height: 1.9;
    color: #555;
    margin-bottom: 35px;
    transition: all 0.8s;
    letter-spacing: 1px;
}

/* 按钮（全新样式） */
.love-btn{
    background: linear-gradient(90deg, #b56576, #c95c70, #d48999);
    color: #fff;
    border: none;
    padding: 18px 48px;
    border-radius: 60px;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 8px 20px rgba(181, 101, 118, 0.25);
    letter-spacing: 1px;
}
.love-btn:hover{
    transform:scale(1.08);
    box-shadow:0 12px 28px rgba(181, 101, 118, 0.35);
}

/* 音频控件隐藏（保留功能） */
.audio-player {
    position: fixed;
    bottom: 20px;
    left: 20px;
    opacity: 0.2;
    transition: opacity 0.3s;
    z-index: 999;
}
.audio-player:hover {
    opacity: 1;
}
</style>
</head>
<body>
<!-- 背景音乐（温柔纯音乐，自动播放+循环） -->
<audio class="audio-player" src="https://music.163.com/song/media/outer/url?id=1889121050.mp3" autoplay loop controls>
    您的浏览器不支持音频播放
</audio>

<div class="card">
    <div class="title">致我最爱的<span class="name">陈容</span></div>
    <div class="text" id="loveText">
        遇见你，是我所有温柔的开始。<br>
        我的世界，因为你而变得绚丽明亮。<br>
        我想把所有浪漫、偏爱、余生<br>
        都只给你一个人。
    </div>

    <button class="love-btn" id="loveBtn" onclick="sendHearts()">❤️ 我爱你，陈容 ❤️</button>
</div>

<script>
let clickCount = 0;

// 点击爱心主函数
function sendHearts(){
    clickCount++;
    const btn = document.getElementById('loveBtn');
    const text = document.getElementById('loveText');
    const card = document.querySelector('.card');

    // 第一次点击：按钮文字变化 + 爱心
    if(clickCount === 1){
        btn.innerHTML = "💖 超级爱你 💖";
        btn.style.transform = "scale(1.15)";
        createHearts(30);
    }

    // 第二次点击：文案变化
    else if(clickCount === 2){
        btn.innerHTML = "🥰 只爱陈容 🥰";
        text.innerHTML = "你是晚风，是星光，是人间理想。<br>你是初见，是心动，是余生唯一。<br>我的温柔，我的宠溺，我的全部，<br>都属于你，只属于你。";
        text.style.color = "#b56576";
        createHearts(40);
    }

    // 第三次点击：终极浪漫 + 全屏烟花
    else if(clickCount === 3){
        btn.innerHTML = "💍 余生请多指教 💍";
        btn.disabled = true;
        btn.style.background = "linear-gradient(90deg, #a84a5f, #b54a5f)";
        
        // 卡片放大更浪漫
        card.style.transform = "scale(1.06)";
        card.style.boxShadow = "0 35px 90px rgba(181, 101, 118, 0.2)";

        // 全屏爱心雨 + 烟花
        createHearts(60);
        createFireworks(25);
    }
}

// 生成爱心
function createHearts(num){
    const colors=["#b56576","#c95c70","#d48999","#e8b4c0","#f5d0d9"];
    for(let i=0;i<num;i++){
        const heart=document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*100+"vw";
        heart.style.fontSize=Math.random()*12+14+"px";
        heart.style.color=colors[Math.floor(Math.random()*colors.length)];
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),3000);
    }
}

// 生成烟花
function createFireworks(num){
    const fireColors = ["#b56576","#c95c70","#d48999","#f5d0d9","#ffffff"];
    for(let i=0;i<num;i++){
        setTimeout(()=>{
            const fire = document.createElement("div");
            fire.classList.add("firework");
            fire.style.background = fireColors[Math.floor(Math.random()*fireColors.length)];
            fire.style.left = Math.random()*100+"vw";
            fire.style.top = Math.random()*100+"vh";
            document.body.appendChild(fire);
            setTimeout(()=>fire.remove(),1500);
        },i*100);
    }
}

// 自动飘心
setInterval(()=>{
    const h=document.createElement("div");
    h.classList.add("heart");
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=Math.random()*10+12+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),3000);
},800);

// 解决部分浏览器自动播放限制（点击页面任意位置触发音频）
document.addEventListener('click', function() {
    const audio = document.querySelector('.audio-player');
    if (audio.paused) {
        audio.play();
    }
}, { once: true });
</script>
</body>
</html>
